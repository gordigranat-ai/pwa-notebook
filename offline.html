<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Офлайн • Заметки</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #f1f5f9;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            max-width: 450px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .icon { font-size: 56px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 16px; color: #f1f5f9; }
        .status {
            background: #0b1120;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            margin-bottom: 24px;
            display: inline-block;
            color: #94a3b8;
            border: 1px solid #334155;
        }
        p { color: #cbd5e1; margin-bottom: 24px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background: #334155;
            color: #f1f5f9;
            font-family: inherit;
            transition: all 0.15s;
        }
        .btn--primary { background: #3b82f6; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .footer { margin-top: 30px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📴</div>
        <h1>Офлайн режим</h1>
        <div class="status" id="status">Ожидание сети...</div>
        <p>Нет подключения к интернету.<br>Заметки доступны из кеша.</p>
        <div class="btn-group">
            <button class="btn btn--primary" onclick="location.reload()">Обновить</button>
            <button class="btn" onclick="window.history.back()">Назад</button>
        </div>
        <div class="footer">PWA Заметки • v3.0</div>
    </div>
    <script>
        function check() {
            const s = document.getElementById('status');
            if (navigator.onLine) {
                s.textContent = '✅ Сеть восстановлена';
                s.style.background = '#10b981';
                s.style.color = 'white';
                setTimeout(() => location.reload(), 1000);
            } else {
                s.textContent = '⏳ Ожидание сети...';
            }
        }
        window.addEventListener('online', check);
        window.addEventListener('offline', check);
        check();
    </script>
</body>
</html>
